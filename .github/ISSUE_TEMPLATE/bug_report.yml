name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Fill in what you can — even partial info helps me track it down.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what you saw. Be specific — the details matter more than you think.
      placeholder: |
        Example: "I ran a forecast with a custom profile, then sorted the grid
        by clicking a column header. After the sort, all my filters disappeared
        and the grid showed unfiltered results."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
      placeholder: |
        Example: "The grid should have stayed filtered after sorting.
        My custom dataspy filters should persist across column sorts."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Walk me through what you were doing. Even rough steps help.
      placeholder: |
        Example:
        1. Selected a custom forecast profile with assigned-to and equipment filters
        2. Clicked Run — grid filtered correctly
        3. Clicked the "Status" column header to sort
        4. Grid reloaded and showed all work orders instead of just the filtered ones
        5. Tried sorting again — same thing, filters gone every time

        Another example:
        1. Laptop went to sleep for ~30 minutes
        2. Opened the lid — got the "Session expired" prompt
        3. Clicked Restore
        4. After login, never got the snapshot restore — just landed on the start screen
    validations:
      required: false

  - type: dropdown
    id: screen
    attributes:
      label: Which screen?
      description: Where were you when the issue happened?
      options:
        - Work Orders (WSJOBS)
        - Compliance Work Orders (CTJOBS)
        - Parts (SSPART)
        - Repair Receipts (SSRCVI)
        - PO Receipts (SSRECV)
        - Equipment (OSOBJS / OSOBJA / OSOBJP)
        - Settings panel
        - Forecast / Quick Search
        - Labor Tracker
        - PTP
        - Other / Not sure
    validations:
      required: false

  - type: dropdown
    id: frequency
    attributes:
      label: How often does it happen?
      options:
        - Every time
        - Sometimes
        - Only happened once
        - Not sure
    validations:
      required: false

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostic report
      description: |
        This is the most useful thing you can attach. **Copy it right after reproducing the bug if possible** — the log history cycles out over time, so fresher = more useful.
        **How to get it:** Open APM Master Menu > Diagnostics tab > Click "Copy Report" button > Paste here.
      render: text
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: If something looks wrong visually, paste a screenshot here (Ctrl+V works).
    validations:
      required: false
